        <section id="hero">
          <h1>Deploy to Flux with Git</h1>
          <p>Git-native deployment for the Flux decentralized network. Push any repo and Orbit automatically detects your framework, builds a container, and deploys across 10,000+ global nodes. Free tier, zero config, built-in CI/CD.</p>
          <a href="/register">Start Deploying Free</a>
          <a href="#features">See all features</a>
        </section>

        <section id="features">
          <h2>Everything you need to ship</h2>
          <ul>
            <li><strong>Unlimited Builds</strong> — Push to your repo and every commit triggers an automatic build and deployment with no limits on build minutes.</li>
            <li><strong>Dedicated Resources</strong> — Your app runs on isolated Flux nodes with guaranteed CPU, RAM, and storage — no noisy neighbours.</li>
            <li><strong>100+ Frameworks</strong> — Next.js, Remix, SvelteKit, Astro, Nuxt, Vite, Django, FastAPI, Flask, Rails, Go, Rust, and more. Auto-detected via Nixpacks.</li>
            <li><strong>Zero Configuration</strong> — No Dockerfile, no YAML manifests. Orbit infers build commands and start commands automatically.</li>
            <li><strong>Built-in CI/CD</strong> — Every push builds, tests, and deploys. Branch deployments and pull-request previews included.</li>
            <li><strong>Custom Domain + SSL</strong> — Point your DNS, SSL terminates automatically through the Flux reverse proxy network.</li>
            <li><strong>Geolocation Selection</strong> — Choose which region your nodes run in, or distribute globally for lower latency.</li>
            <li><strong>Deploy Previews</strong> — Every pull request gets its own live preview URL before merging to production.</li>
            <li><strong>Auto Rollback</strong> — Health checks fail? Orbit rolls back to the last known-good deployment instantly.</li>
            <li><strong>Monorepo Support</strong> — Deploy individual services from a single repository using root-directory configuration.</li>
            <li><strong>Health Monitoring</strong> — Continuous uptime checks with alerting and auto-restart on failure.</li>
            <li><strong>Enhanced Security</strong> — Private repos, secrets management, and isolated execution on Flux's ArcaneOS nodes.</li>
          </ul>
        </section>

        <section id="faq">

          <dl>
            <dt>What is Orbit?</dt>
            <dd>Orbit is a Git-native deployment platform built on the Flux decentralized cloud network. Push your code and Orbit automatically builds, deploys, and scales your app across 10,000+ nodes worldwide. No server management required.</dd>

            <dt>How is my data kept secure?</dt>
            <dd>Enterprise apps run inside ArcaneOS, Flux's hardened execution environment, where all data is encrypted at rest. Your code, secrets, and persistent storage are fully isolated and encrypted, with no shared tenancy at the infrastructure level.</dd>

            <dt>What frameworks are supported?</dt>
            <dd>Orbit supports 50+ frameworks including Next.js, Remix, SvelteKit, Astro, Nuxt, Create React App, Vite, Django, FastAPI, Flask, Rails, Go, Rust, and more. Framework detection is automatic based on your project files.</dd>

            <dt>Is the free tier really free forever?</dt>
            <dd>Yes. The Free plan (0.5 vCPU, 1 GB RAM, 5 GB storage, 1 instance) is free forever with no credit card required. Paid plans add more resources and instances.</dd>

            <dt>How is Orbit different from Vercel or Netlify?</dt>
            <dd>Orbit deploys to the Flux decentralized network, meaning no single company controls your infrastructure. Your app runs on multiple independent nodes globally, providing true redundancy with no vendor lock-in.</dd>

            <dt>Can I use a custom domain?</dt>
            <dd>Yes. Developer and Pro plans support custom domains. Point your DNS to your Orbit deployment and SSL is handled automatically through the Flux reverse proxy network.</dd>
