services:
  orbit-ui:
    build: .
    ports:
      - "${PORT:-4000}:4000"
    # No environment variables required. The image runs against the shared FluxOS
    # defaults (config/defaults.js); login/signing is delegated to
    # service.fluxcore.ai. NODE_ENV / PORT / CHROMIUM_PATH are baked into the
    # Dockerfile. Override any public value below only when self-hosting:
    #   environment:
    #     VITE_PAYMENT_BRIDGE_URL: ...  # to point Stripe/pricing at your own bridge
    shm_size: "256mb"
    restart: unless-stopped
