services:
  orbit-ui:
    build: .
    ports:
      - "${PORT:-4000}:4000"
    # No environment variables required. The image runs against the shared FluxOS
    # defaults (config/defaults.js) with SSO delegated to service.fluxcore.ai.
    # NODE_ENV / PORT / CHROMIUM_PATH are baked into the Dockerfile.
    # Override any public value below only when self-hosting:
    #   environment:
    #     SSO_PROVIDER: self            # self-sign instead of using fluxcore.ai
    #     SSO_SIGNING_SECRET: <hex>     # required only when SSO_PROVIDER=self
    #     VITE_FIREBASE_PROJECT_ID: ... # to use your own Firebase project
    #     VITE_STRIPE_PUBLISHABLE_KEY: pk_live_...
    shm_size: "256mb"
    restart: unless-stopped
